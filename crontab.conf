# Songpa Tennis Court Availability Scraper - Crontab Configuration
# ================================================================
#
# This file defines the cron schedule for the tennis court scraper.
# Install with:  crontab crontab.conf
# Verify with:   crontab -l
# Remove with:   crontab -r
#
# Note: If you have existing crontab entries you want to keep,
#       use the setup.sh script instead, which merges safely.

# ── Environment ─────────────────────────────────────────────────
# Required for Playwright/Chromium on macOS
PATH=/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
SHELL=/bin/bash

# ── Schedule ────────────────────────────────────────────────────
# Run scraper every 5 minutes, all day
*/5 * * * * /Users/mac-mini/dev/crawling/run.sh >> /Users/mac-mini/dev/crawling/logs/cron.log 2>&1

# ── Log cleanup: delete logs older than 7 days (daily at 3 AM) ──
0 3 * * * find /Users/mac-mini/dev/crawling/logs -name "*.log" -mtime +7 -delete 2>/dev/null
